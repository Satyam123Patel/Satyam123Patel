<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <!-- Glow filter -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark card base -->
  <rect width="118" height="118" x="1" y="1" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- Network Circuit Lines -->
  <g stroke="#3b82f6" stroke-width="1.2" opacity="0.6" fill="none">
    <path id="route-1" d="M 60 52 L 30 25 L 30 80 L 60 52"/>
    <path id="route-2" d="M 60 52 L 90 25 L 90 80 L 60 52"/>
    <path id="route-3" d="M 30 25 L 90 25"/>
    <path id="route-4" d="M 30 80 L 90 80"/>
  </g>

  <!-- Network Nodes -->
  <g fill="#1f2937" stroke="#3b82f6" stroke-width="2">
    <!-- Center Node -->
    <circle cx="60" cy="52" r="6" fill="#60a5fa" filter="url(#glow-purple)"/>
    <!-- Outer Nodes -->
    <circle cx="30" cy="25" r="5" />
    <circle cx="90" cy="25" r="5" />
    <circle cx="30" cy="80" r="5" />
    <circle cx="90" cy="80" r="5" />
  </g>

  <!-- Signal Packets flowing -->
  <circle r="2" fill="#60a5fa">
    <animateMotion dur="3s" repeatCount="indefinite" path="M 60 52 L 30 25 L 30 80 L 60 52" />
  </circle>
  <circle r="2" fill="#38bdf8">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 60 52 L 90 25 L 90 80 L 60 52" />
  </circle>
  <circle r="2" fill="#818cf8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M 30 25 L 90 25 M 90 80 L 30 80" />
  </circle>

  <text x="60" y="105" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Microservices</text>
</svg>
