<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark card base -->
  <rect width="118" height="118" x="1" y="1" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <g transform="translate(60, 60)">
    <!-- Central core -->
    <circle cx="0" cy="0" r="8" fill="#00d8ff" filter="url(#glow-cyan)"/>

    <!-- Ellipse 1 (Horizontal-ish) -->
    <ellipse rx="38" ry="14" fill="none" stroke="#00d8ff" stroke-width="1.5" transform="rotate(30)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="30" to="390" dur="8s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Ellipse 2 -->
    <ellipse rx="38" ry="14" fill="none" stroke="#00d8ff" stroke-width="1.5" transform="rotate(90)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="90" to="450" dur="8s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Ellipse 3 -->
    <ellipse rx="38" ry="14" fill="none" stroke="#00d8ff" stroke-width="1.5" transform="rotate(150)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="150" to="510" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <text x="60" y="105" fill="#58a6ff" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">React</text>
</svg>
